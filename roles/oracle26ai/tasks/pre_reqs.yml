- name: Configurar Hostname
  hostname:
    name: "{{ oracle_hostname }}"

- name: Desabilitar Firewalld
  systemd:
    name: firewalld
    state: stopped
    enabled: no

- name: Desabilitar SELinux
  selinux:
    state: disabled

- name: Instalar pacote de pré-requisitos do Oracle 26ai
  yum:
    name: oracle-ai-database-preinstall-26ai.x86_64
    state: present

- name: Configurar Clock Source para tsc
  shell: echo "tsc" > /sys/devices/system/clocksource/clocksource0/current_clocksource
  ignore_errors: yes
